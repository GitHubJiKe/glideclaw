<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlideClaw 元数据控制台</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>GlideClaw 元数据控制台</h1>
        <p class="subtitle">管理助手元数据表。支持增删改查和导出，不支持删除数据库和表。</p>
      </header>

      <main class="main">
        <aside class="sidebar">
          <section class="section">
            <label for="tableSelect" class="label">选择表：</label>
            <select id="tableSelect" class="select"></select>
          </section>

          <section class="section">
            <div class="button-group">
              <button id="reloadBtn" class="btn btn-primary">刷新</button>
              <button id="exportBtn" class="btn btn-secondary">导出 JSON</button>
            </div>
          </section>

          <section class="section">
            <h2 class="section-title">新增/编辑行</h2>
            <p class="hint">使用 JSON 对象。键必须与表列匹配。</p>
            <textarea
              id="editor"
              class="textarea"
              placeholder='例如：{"name":"demo","description":"..."}'
            ></textarea>
            <div class="button-group">
              <button id="createBtn" class="btn btn-success">新增</button>
              <button id="updateBtn" class="btn btn-warning">更新</button>
              <input id="updateId" type="text" class="input" placeholder="输入 ID" />
            </div>
          </section>

          <div id="message" class="message"></div>
        </aside>

        <section class="content">
          <div id="rows" class="rows-container"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/script.js"></script>
  </body>
</html>
