<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlideClaw 元数据控制台</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>GlideClaw 数据管理控制台</h1>
        <p class="subtitle">管理助手配置、对话消息和日志数据。支持增删改查和导出，不支持删除数据库和表。</p>
      </header>

      <main class="main">
        <aside class="sidebar">
          <section class="section">
            <label for="tableSelect" class="label">选择表：</label>
            <select id="tableSelect" class="select"></select>
          </section>

          <section class="section">
            <div class="button-group">
              <button id="reloadBtn" class="btn btn-primary">刷新</button>
              <button id="exportBtn" class="btn btn-secondary">导出 JSON</button>
            </div>
          </section>

          <section class="section">
            <h2 class="section-title">新增/编辑行</h2>
            <p class="hint">使用 JSON 对象。键必须与表列匹配。</p>
            <textarea
              id="editor"
              class="textarea"
              placeholder='例如：{"name":"demo","description":"..."}'
            ></textarea>
            <div class="button-group">
              <button id="createBtn" class="btn btn-success">新增</button>
              <button id="updateBtn" class="btn btn-warning">更新</button>
              <input id="updateId" type="text" class="input" placeholder="输入 ID" />
            </div>
          </section>

          <section class="section">
            <h2 class="section-title">📁 本地文件操作</h2>
            <p class="hint">支持读取、写入和列表本地文件（安全限制适用）</p>
            
            <div class="file-op-group">
              <label class="label">读取文件路径：</label>
              <div class="input-group">
                <input id="readFilePath" type="text" class="input" placeholder="例如：/Users/username/file.txt" />
                <button id="readFileBtn" class="btn btn-secondary">📖 读取</button>
              </div>
            </div>

            <div class="file-op-group">
              <label class="label">写入文件路径：</label>
              <div class="input-group">
                <input id="writeFilePath" type="text" class="input" placeholder="例如：/Users/username/output.txt" />
                <button id="writeFileBtn" class="btn btn-secondary">💾 写入</button>
              </div>
            </div>

            <div class="file-op-group">
              <label class="label">列表目录路径：</label>
              <div class="input-group">
                <input id="listDirPath" type="text" class="input" placeholder="例如：/Users/username/Documents" />
                <button id="listDirBtn" class="btn btn-secondary">📂 列表</button>
              </div>
            </div>

            <div id="fileOutput" class="file-output"></div>
          </section>

          <div id="message" class="message"></div>
        </aside>

        <section class="content">
          <div id="rows" class="rows-container"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/script.js"></script>
  </body>
</html>
